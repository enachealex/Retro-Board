name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # Use same host as the app when DNS points at the tunnel (see docs/CLOUDFLARE-FREE.md).
          # If you keep GitHub Pages + api subdomain, set this to https://api.thejumpvault.com
          # and remove Cloudflare Access on that hostname (free to delete).
          VITE_API_BASE_URL: https://retroboard.thejumpvault.com
          VITE_HCAPTCHA_SITE_KEY: 7f02f2f0-347c-46aa-a026-61ae184ef028

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
